services:
  mongo:
    image: mongo:7
    container_name: infosec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - infosec
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: infosec-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - infosec
      - llm-network

  ollama:
    image: ollama/ollama:latest
    container_name: infosec-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - llm-network
    environment:
      - OLLAMA_HOST=0.0.0.0

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: infosec-backend
    restart: unless-stopped
    depends_on:
      - mongo
      - chroma
    env_file:
      - .env
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    ports:
      - "3001:3000"
    networks:
      - infosec
      - llm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infosec-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - infosec
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "backend:172.18.0.1"

volumes:
  mongo_data:
  chroma_data:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:
  ollama_data:

networks:
  infosec:
    driver: bridge
  llm-network:
    external: true
