services:
  mongo:
    image: mongo:7
    container_name: infosec-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - infosec

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: infosec-backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    ports:
      - "3001:3000"
    networks:
      - infosec
      - llm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infosec-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"
    networks:
      - infosec

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:

networks:
  infosec:
    driver: bridge
  llm-network:
    external: true
